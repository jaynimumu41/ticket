<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f766e" />
    <title>日本機票雷達</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="apple-touch-icon" href="assets/icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="機票雷達" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <svg class="icon-sprite" aria-hidden="true">
      <symbol id="icon-plane" viewBox="0 0 24 24">
        <path d="M10.8 21.2 9 14.6 2.8 12.2c-.7-.3-.7-1.3 0-1.6L21 3.2c.7-.3 1.4.4 1.1 1.1l-7.4 18.2c-.3.7-1.3.7-1.6 0l-2.3-6.2-3.5-3.5" />
      </symbol>
      <symbol id="icon-bell" viewBox="0 0 24 24">
        <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9" />
        <path d="M13.7 21a2 2 0 0 1-3.4 0" />
      </symbol>
      <symbol id="icon-refresh" viewBox="0 0 24 24">
        <path d="M21 12a9 9 0 0 1-15.5 6.2L3 16" />
        <path d="M3 16v5h5M3 12A9 9 0 0 1 18.5 5.8L21 8" />
        <path d="M16 8h5V3" />
      </symbol>
      <symbol id="icon-star" viewBox="0 0 24 24">
        <path d="m12 2.8 2.8 5.7 6.3.9-4.5 4.4 1 6.2-5.6-3-5.6 3 1-6.2-4.5-4.4 6.3-.9L12 2.8Z" />
      </symbol>
      <symbol id="icon-chart" viewBox="0 0 24 24">
        <path d="M3 3v18h18" />
        <path d="m7 15 4-4 3 3 5-7" />
      </symbol>
      <symbol id="icon-calendar" viewBox="0 0 24 24">
        <path d="M8 2v4M16 2v4M3 10h18" />
        <path d="M5 4h14a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z" />
      </symbol>
      <symbol id="icon-link" viewBox="0 0 24 24">
        <path d="M10 13a5 5 0 0 0 7.1 0l2-2a5 5 0 0 0-7.1-7.1l-1.1 1.1" />
        <path d="M14 11a5 5 0 0 0-7.1 0l-2 2A5 5 0 0 0 12 20.1l1.1-1.1" />
      </symbol>
      <symbol id="icon-chevron" viewBox="0 0 24 24">
        <path d="m9 18 6-6-6-6" />
      </symbol>
      <symbol id="icon-search" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.35-4.35" />
      </symbol>
      <symbol id="icon-event" viewBox="0 0 24 24">
        <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6L12 2z" />
      </symbol>
      <symbol id="icon-zap" viewBox="0 0 24 24">
        <path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z" />
      </symbol>
    </svg>

    <div class="app-shell">
      <header class="app-hero">
        <img src="assets/japan-flight-banner.png" alt="" />
        <div class="hero-shade"></div>
        <div class="hero-content">
          <div class="hero-top">
            <div class="brand">
              <span class="brand-mark"><svg><use href="#icon-plane"></use></svg></span>
              <div>
                <h1>日本機票雷達</h1>
              </div>
            </div>
          </div>

          <div class="hero-bottom">
            <p id="fareRange" class="sync-status"></p>
          </div>
        </div>
      </header>

      <main>
        <!-- 主功能分頁 -->
        <nav class="main-tab-nav" id="mainTabNav" role="tablist" aria-label="功能分頁">
          <button class="main-tab-btn active" data-tab="recommend" role="tab" aria-selected="true">
            <svg><use href="#icon-star"></use></svg>
            目前推薦
          </button>
          <button class="main-tab-btn" data-tab="search" role="tab" aria-selected="false">
            <svg><use href="#icon-search"></use></svg>
            智能搜尋
          </button>
        </nav>

        <!-- 目前推薦分頁 -->
        <div class="tab-panel" id="panel-recommend">
          <section class="control-panel" aria-label="出發機場">
            <p class="section-kicker">出發機場</p>
            <div class="departure-tabs" id="departureTabs" role="tablist" aria-label="台灣出發機場"></div>
          </section>

          <!-- 航空公司篩選 -->
          <div class="airline-filter-bar" id="airlineFilterBar" role="tablist" aria-label="航空公司篩選"></div>

          <div class="metric-strip" aria-live="polite">
            <div>
              <span id="recommendCount">0</span>
              <small>可考慮購買</small>
            </div>
            <div>
              <span id="airportCount">0</span>
              <small>日本目的地</small>
            </div>
          </div>

          <section class="recommend-layout">
            <div class="recommend-column">
              <div class="section-heading">
                <div>
                  <h2>目前推薦</h2>
                </div>
                <span class="tiny-note" id="currentAirportNote"></span>
              </div>
              <p class="recommend-basis" id="recommendBasis"></p>
              <div class="airline-groups" id="airlineGroups" aria-live="polite"></div>
            </div>
          </section>

          <section class="promo-panel" aria-labelledby="promoTitle">
            <div class="section-heading">
              <div>
                <h2 id="promoTitle">促銷提醒</h2>
              </div>
            </div>
            <div class="promo-list" id="promoList"></div>
          </section>
        </div>

        <!-- 智能搜尋分頁 -->
        <div class="tab-panel hidden" id="panel-search">
          <section class="search-panel" aria-labelledby="searchTitle">
            <div class="section-heading">
              <div>
                <h2 id="searchTitle">智能搜尋</h2>
              </div>
            </div>
            <form class="search-form" id="searchForm" novalidate>
              <div class="search-fields">
                <div class="field-group">
                  <label for="s-airline">航空公司</label>
                  <select id="s-airline" name="airline">
                    <option value="">任一航空</option>
                    <option value="CI">中華航空 (CI)</option>
                    <option value="JX">星宇航空 (JX)</option>
                    <option value="BR">長榮航空 (BR)</option>
                  </select>
                </div>
                <div class="field-group">
                  <label for="s-from">出發機場</label>
                  <select id="s-from" name="from">
                    <option value="">任一台灣機場</option>
                    <option value="TPE">台北桃園（TPE）</option>
                    <option value="TSA">台北松山（TSA）</option>
                  </select>
                </div>
                <div class="field-group">
                  <label for="s-to">目的地</label>
                  <select id="s-to" name="to">
                    <option value="">任一日本機場</option>
                    <option value="NRT">東京成田（NRT）</option>
                    <option value="HND">東京羽田（HND）</option>
                    <option value="KIX">大阪關西（KIX）</option>
                    <option value="FUK">福岡（FUK）</option>
                    <option value="CTS">札幌新千歲（CTS）</option>
                    <option value="NGO">名古屋（NGO）</option>
                    <option value="HIJ">廣島（HIJ）</option>
                    <option value="OKA">沖繩那霸（OKA）</option>
                    <option value="KMJ">熊本（KMJ）</option>
                    <option value="SDJ">仙台（SDJ）</option>
                    <option value="TAK">高松（TAK）</option>
                    <option value="HKD">函館（HKD）</option>
                  </select>
                </div>
                <div class="field-group">
                  <label for="s-depart">出發時間</label>
                  <select id="s-depart" name="depart">
                    <!-- 由 app.js 依實際資料月份填入：2026年12月 / 2027年1月 / 2027年2月 -->
                  </select>
                </div>
                <div class="field-group">
                  <label for="s-duration">旅遊天數</label>
                  <select id="s-duration" name="duration">
                    <option value="">不限</option>
                    <option value="3">3 天</option>
                    <option value="4">4 天</option>
                    <option value="5">5 天</option>
                    <option value="6">6 天</option>
                    <option value="7">7 天</option>
                    <option value="8">8 天</option>
                    <option value="10">10 天</option>
                    <option value="14">14 天</option>
                  </select>
                </div>
                <div class="field-group">
                  <label for="s-pax">人數</label>
                  <select id="s-pax" name="passengers">
                    <option value="1">1 人</option>
                    <option value="2" selected>2 人</option>
                    <option value="3">3 人</option>
                    <option value="4">4 人</option>
                    <option value="5">5 人</option>
                    <option value="6">6 人</option>
                  </select>
                </div>
              </div>
              <button class="search-btn" type="submit">
                <svg><use href="#icon-search"></use></svg>
                分析這個月份的票價
              </button>
            </form>
          </section>

          <section class="search-results-panel" id="searchResults" aria-live="polite"></section>
        </div>
      </main>

      <footer class="page-foot">
        <p id="syncStatus" class="sync-status">尚未同步官方公開票價頁</p>
      </footer>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="app.js?v=20260602b" defer></script>
  </body>
</html>
